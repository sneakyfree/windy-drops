name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  schema:
    name: schema (ajv + jsonschema)
    runs-on: [self-hosted, linux, x64]
    steps:
      - uses: actions/checkout@v4
      - name: runner-lint (hosted runners are billing-locked)
        run: bash "$GITHUB_WORKSPACE/.github/lint/lint-runner-labels.sh" "$GITHUB_WORKSPACE/.github/workflows"
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: python -m pip install --upgrade pip jsonschema
      - run: bash tools/conformance/run.sh

  ts-bindings:
    name: ts-bindings (@windy/drops-artifact-spec)
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: packages/artifact-spec
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
      - run: npm run codegen:check
      - run: npm run build
      - run: npm test

  py-bindings:
    name: py-bindings (windy-drops-spec)
    runs-on: [self-hosted, linux, x64]
    defaults:
      run:
        working-directory: python/artifact-spec
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - name: Regenerate + staleness check
        run: |
          uvx --with datamodel-code-generator python codegen.py
          git diff --exit-code -- src/windy_drops_spec/_generated.py
      - name: Build wheel + sdist
        run: uv build
      - name: Install + test
        run: |
          uv venv
          uv pip install -e .[test]
          .venv/bin/pytest tests/ -v

  ts-sdk:
    name: ts-sdk (@windy/drops-sdk)
    runs-on: [self-hosted, linux, x64]
    needs: ts-bindings
    defaults:
      run:
        working-directory: packages/sdk
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - run: npm install
        working-directory: .
      # @windy/drops-sdk imports @windy/drops-artifact-spec whose `main` points
      # at ./dist/ — npm workspaces resolves the symlink but ts-sdk fails to
      # compile if artifact-spec's dist/ is missing. Build it here since each
      # CI job is a fresh runner (the ts-bindings job's dist/ doesn't carry).
      - name: Build artifact-spec (workspace dep)
        run: npm run build --workspace=@windy/drops-artifact-spec
        working-directory: .
      - run: npm run build
      - run: npm test

  py-sdk:
    name: py-sdk (windy-drops)
    runs-on: [self-hosted, linux, x64]
    needs: py-bindings
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: astral-sh/setup-uv@v3
      # Tests in python/sdk/tests/test_sign.py shell out to the TS SDK CLI
      # (`node packages/sdk/bin/windy-drops new ...`) for cross-SDK
      # byte-identity coverage, so we need the TS workspace built before
      # pytest runs.
      - name: Build TS workspace (artifact-spec + sdk)
        run: |
          npm install
          npm run build --workspace=@windy/drops-artifact-spec
          npm run build --workspace=@windy/drops-sdk
      - name: Install Python deps + run pytest
        working-directory: python/sdk
        run: |
          uv venv
          uv pip install -e ../artifact-spec -e .[test]
          .venv/bin/pytest tests/ -v

  cross-sdk-identity:
    name: WD-11 cross-SDK byte-identity
    runs-on: [self-hosted, linux, x64]
    needs: [ts-sdk, py-sdk]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - uses: astral-sh/setup-uv@v3
      - name: Build TS workspace (artifact-spec + sdk)
        # Each CI job is a fresh runner, so artifact-spec dist/ from the
        # ts-bindings job is not present here. Build both before the
        # conformance harness invokes the TS CLI.
        run: |
          npm install
          npm run build --workspace=@windy/drops-artifact-spec
          npm run build --workspace=@windy/drops-sdk
      - name: Install Python SDK
        working-directory: python/sdk
        run: |
          uv venv
          uv pip install -e ../artifact-spec -e .
      - name: Run conformance harness
        run: bash tools/conformance/run-bundle-identity.sh
