[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "windy-drops-spec"
version = "0.1.0"
description = "Python bindings (Pydantic v2) for the windy.drop.v1 manifest format. Generated from schemas/windy.drop.v1.json — WD-2 of DNA_STRAND_MASTER_PLAN.md."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
    { name = "Windy Drops contributors" },
]
keywords = ["windy", "drops", "skill", "manifest", "schema", "pydantic"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.7",
]

[project.optional-dependencies]
codegen = [
    # Pinned: the CI staleness check regenerates with exactly this version.
    # Generator output format drifts across releases, so an unpinned codegen
    # dependency makes committed bindings rot without any schema change.
    "datamodel-code-generator==0.70.0",
]
test = [
    "pytest>=8",
]

[project.urls]
Homepage = "https://windydrops.com"
Repository = "https://github.com/sneakyfree/windy-drops"
Issues = "https://github.com/sneakyfree/windy-drops/issues"

[tool.hatch.build.targets.wheel]
packages = ["src/windy_drops_spec"]

[tool.hatch.build.targets.sdist]
include = [
    "src/windy_drops_spec",
    "README.md",
    "pyproject.toml",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
